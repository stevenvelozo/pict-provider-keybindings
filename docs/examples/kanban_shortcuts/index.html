<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Kanban Shortcuts - pict-provider-keybindings</title>
		<link rel="stylesheet" href="./kanban-shortcuts.css" />
		<!-- PICT Dynamic View CSS Container -->
		<style id="PICT-CSS"></style>
		<!-- Load the PICT library (root-level path so docs staging can externalize it to the CDN) -->
		<script src="https://cdn.jsdelivr.net/npm/pict@1/dist/pict.min.js" type="text/javascript"></script>
		<!-- Bootstrap the Application -->
		<script type="text/javascript">
//<![CDATA[
		Pict.safeOnDocumentReady(() => { Pict.safeLoadPictApplication(PictProviderKeybindingsExampleKanbanShortcuts, 2)});
//]]>
		</script>
	</head>
	<body>
		<!-- Pict Example Header -->
		<div class="pict-example-header">
			<div class="pict-example-badge">
				<svg viewBox="0 0 16 16"><polygon points="8,1 10,6 16,6 11,9.5 13,15 8,11.5 3,15 5,9.5 0,6 6,6"/></svg>
				Pict Example
			</div>
			<div class="pict-example-app-name">Kanban Shortcuts</div>
			<div class="pict-example-module">pict-provider-keybindings</div>
		</div>
		<div id="KanbanShortcuts-Application-Container"></div>
		<!-- Load the application bundle -->
		<script src="./pict-provider-keybindings-example-kanban-shortcuts.compatible.min.js" type="text/javascript"></script>
	</body>
</html>
